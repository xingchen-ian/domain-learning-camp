    document.getElementById('result-msg').innerHTML = `You navigated the cosmos and reached the wormhole.<br>你穿越了星辰大海，抵达了虫洞。<br><br>Fuel remaining: ${Math.round(ship.fuel)}% / 剩余燃料: ${Math.round(ship.fuel)}%`;
    document.getElementById('result-btn').textContent = 'PLAY AGAIN / 再来一次';
    return;
  }

  if (gameState === STATE.FAILURE) {
    document.getElementById('hud').style.display = 'none';
    document.getElementById('dock-hint').style.display = 'none';
    document.getElementById('result').classList.add('show');
    document.getElementById('result-title').style.textShadow = '0 0 30px rgba(255,80,80,0.6)';

    if (failReason === 'blackhole') {
      document.getElementById('result-title').textContent = 'CONSUMED BY DARKNESS / 被黑暗吞噬';
      document.getElementById('result-title').style.color = '#8040ff';
      document.getElementById('result-msg').innerHTML = 'The black hole\'s gravity was too strong.<br>黑洞的引力太过强大。<br><br>"Do not go gentle into that good night."<br>"不要温和地走进那个良夜。"';
    } else if (failReason === 'obstacle') {
      document.getElementById('result-title').textContent = 'SHIP DESTROYED / 飞船损毁';
      document.getElementById('result-title').style.color = '#ff6040';
      document.getElementById('result-msg').innerHTML = 'Collision with space debris.<br>与太空碎片发生碰撞。<br><br>Navigate more carefully next time.<br>下次请更谨慎地导航。';
    } else if (failReason === 'fuel') {
      document.getElementById('result-title').textContent = 'FUEL DEPLETED / 燃料耗尽';
      document.getElementById('result-title').style.color = '#ffaa40';
      document.getElementById('result-msg').innerHTML = 'Stranded in the void of space.<br>漂流在虚空之中。<br><br>Use orbital mechanics to conserve fuel.<br>利用轨道力学节省燃料。';
    } else if (failReason === 'boundary') {
      document.getElementById('result-title').textContent = 'LOST IN THE VOID / 迷失虚空';
      document.getElementById('result-title').style.color = '#ff5050';
      document.getElementById('result-msg').innerHTML = 'You drifted beyond the edge of known space.<br>你飘出了已知宇宙的边界。<br><br>"We used to look up at the sky and wonder..."<br>"我们曾经仰望星空……"';
    }
    document.getElementById('result-btn').textContent = 'RETRY / 重试';
    return;
  }

  animFrame = requestAnimationFrame(gameLoop);
}

// ─── GAME CONTROL ─────────────────────────────────────────────────
function startGame() {
  mouseDown = false; mouseRightDown = false; // prevent stuck-input bug
  playMusic();
  document.getElementById('menu').style.display = 'none';
  document.getElementById('result').classList.remove('show');
  document.getElementById('hud').style.display = 'block';
  document.getElementById('dock-hint').style.display = 'block';
  document.getElementById('warning').style.opacity = '0';
  generateLevel();
  gameState = STATE.DOCKED;
  if (!animFrame) animFrame = requestAnimationFrame(gameLoop);
}

function restartGame() {
  cancelAnimationFrame(animFrame);
  animFrame = null;
  mouseDown = false; mouseRightDown = false; // prevent stuck-input bug
  document.getElementById('result').classList.remove('show');
  document.getElementById('hud').style.display = 'block';
  document.getElementById('dock-hint').style.display = 'block';
  document.getElementById('warning').style.opacity = '0';
  generateLevel();
  gameState = STATE.DOCKED;
  animFrame = requestAnimationFrame(gameLoop);
}

function goToMenu() {
  cancelAnimationFrame(animFrame);
  animFrame = null;
  mouseDown = false; mouseRightDown = false; // prevent stuck-input bug
  document.getElementById('result').classList.remove('show');
  document.getElementById('hud').style.display = 'none';
  document.getElementById('dock-hint').style.display = 'none';
  document.getElementById('warning').style.opacity = '0';
  document.getElementById('menu').style.display = 'flex';
  randomQuote();
  generateLevel();
  gameState = STATE.MENU;
  animFrame = requestAnimationFrame(gameLoop);
}

// ─── MUSIC: "Cornfield Chase" - Hans Zimmer, Interstellar ───────
const bgm = document.getElementById('bgm');
bgm.volume = 0.25; // moderate-low volume

function playMusic() {
  if (bgm.paused) {
    bgm.play().catch(() => {}); // ignore autoplay errors
  }
}

function stopMusic() {
  bgm.pause();
  bgm.currentTime = 0;
}

// ─── STARTUP ──────────────────────────────────────────────────────
// Music starts on first user click (browser autoplay policy)
canvas.addEventListener('click', () => playMusic(), { once: true });
document.getElementById('menu-btn').addEventListener('click', () => playMusic());
generateLevel();
randomQuote();
animFrame = requestAnimationFrame(gameLoop);
